version: "3.9"

# CareerOS Campus AI — Intel-optimized placement-readiness operating layer.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  core-api:
    build:
      context: ./services/core-api
    environment:
      DATABASE_URL: postgresql+psycopg2://careeros:careeros@postgres:5432/careeros
      REDIS_URL: redis://redis:6379/0
      ATS_ENGINE_URL: http://ats-engine:8001
      AI_REWRITER_URL: http://ai-rewriter:8003
      RESUME_PARSER_URL: http://resume-parser:8004
      JWT_SECRET: super-secret-change-me
      AUTO_CREATE_TABLES: "false"
      EXPORTS_DIR: /tmp/careeros-exports
      EXPORT_STORAGE: local
    depends_on:
      - postgres
      - redis
      - ats-engine
      - ai-rewriter
      - resume-parser
    ports:
      - "8000:8000"

  core-worker:
    build:
      context: ./services/core-api
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://careeros:careeros@postgres:5432/careeros
      REDIS_URL: redis://redis:6379/0
      ATS_ENGINE_URL: http://ats-engine:8001
      AI_REWRITER_URL: http://ai-rewriter:8003
      RESUME_PARSER_URL: http://resume-parser:8004
      JWT_SECRET: super-secret-change-me
      AUTO_CREATE_TABLES: "false"
      EXPORTS_DIR: /tmp/careeros-exports
      EXPORT_STORAGE: local
    depends_on:
      - redis
      - postgres
      - core-api

  ats-engine:
    build:
      context: ./services/ats-engine

  ai-rewriter:
    build:
      context: ./services/ai-rewriter

  resume-parser:
    build:
      context: ./services/resume-parser

volumes:
  pg_data:
