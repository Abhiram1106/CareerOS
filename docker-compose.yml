# CareerOS Campus AI — Intel-optimized placement-readiness operating layer.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros -d careeros"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  core-api:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://careeros:careeros@postgres:5432/careeros
      REDIS_URL: redis://redis:6379/0
      ATS_ENGINE_URL: http://ats-engine:8001
      AI_REWRITER_URL: http://ai-rewriter:8003
      RESUME_PARSER_URL: http://resume-parser:8004
      MATCH_ENGINE_URL: http://match-engine:8005
      JOBS_FEED_URL: http://jobs-feed:8006
      JWT_SECRET: super-secret-change-me
      AUTO_CREATE_TABLES: "true"
      EXPORTS_DIR: /tmp/careeros-exports
      EXPORT_STORAGE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ats-engine:
        condition: service_healthy
      ai-rewriter:
        condition: service_healthy
      resume-parser:
        condition: service_healthy
      match-engine:
        condition: service_healthy
      jobs-feed:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - export_data:/tmp/careeros-exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  core-worker:
    build:
      context: .
      dockerfile: services/core-api/Dockerfile
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://careeros:careeros@postgres:5432/careeros
      REDIS_URL: redis://redis:6379/0
      ATS_ENGINE_URL: http://ats-engine:8001
      AI_REWRITER_URL: http://ai-rewriter:8003
      RESUME_PARSER_URL: http://resume-parser:8004
      MATCH_ENGINE_URL: http://match-engine:8005
      JOBS_FEED_URL: http://jobs-feed:8006
      JWT_SECRET: super-secret-change-me
      AUTO_CREATE_TABLES: "true"
      EXPORTS_DIR: /tmp/careeros-exports
      EXPORT_STORAGE: local
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      core-api:
        condition: service_healthy
    volumes:
      - export_data:/tmp/careeros-exports

  ats-engine:
    build:
      context: .
      dockerfile: services/ats-engine/Dockerfile
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-rewriter:
    build:
      context: ./services/ai-rewriter
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  resume-parser:
    build:
      context: ./services/resume-parser
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  match-engine:
    build:
      context: ./services/match-engine
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

  jobs-feed:
    build:
      context: ./services/jobs-feed
    environment:
      REDIS_URL: redis://redis:6379/0
      JOBS_SEED_PATH: /app/infra/seed/jobs.seed.json
    volumes:
      - ./infra/seed:/app/infra/seed:ro
    ports:
      - "8006:8006"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pg_data:
  export_data:
