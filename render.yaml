services:
  - type: keyvalue
    name: careeros-redis
    plan: free
    ipAllowList: []

  - type: pserv
    name: careeros-ats-engine
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: services/ats-engine/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8001
    healthCheckPath: /health
    autoDeploy: true

  - type: pserv
    name: careeros-ai-rewriter
    runtime: docker
    plan: starter
    dockerContext: services/ai-rewriter
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8003
    healthCheckPath: /health
    autoDeploy: true

  - type: pserv
    name: careeros-resume-parser
    runtime: docker
    plan: starter
    dockerContext: services/resume-parser
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8004
    healthCheckPath: /health
    autoDeploy: true

  - type: pserv
    name: careeros-match-engine
    runtime: docker
    plan: starter
    dockerContext: services/match-engine
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8005
    healthCheckPath: /health
    autoDeploy: true

  - type: pserv
    name: careeros-jobs-feed
    runtime: docker
    plan: starter
    dockerContext: services/jobs-feed
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8006
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: careeros-redis
          property: connectionString
      - key: JOBS_SEED_PATH
        value: /app/seed/jobs.seed.json
    autoDeploy: true

  - type: web
    name: careeros-core-api
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: services/core-api/Dockerfile
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careeros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: careeros-redis
          property: connectionString
      - key: ATS_ENGINE_URL
        value: http://careeros-ats-engine:8001
      - key: AI_REWRITER_URL
        value: http://careeros-ai-rewriter:8003
      - key: RESUME_PARSER_URL
        value: http://careeros-resume-parser:8004
      - key: MATCH_ENGINE_URL
        value: http://careeros-match-engine:8005
      - key: JOBS_FEED_URL
        value: http://careeros-jobs-feed:8006
      - key: JWT_SECRET
        generateValue: true
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: EXPORT_STORAGE
        value: local
      - key: EXPORTS_DIR
        value: /tmp/careeros-exports
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "30"
    autoDeploy: true

  - type: worker
    name: careeros-core-worker
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: services/core-api/Dockerfile
    dockerCommand: celery -A app.workers.celery_app.celery worker --loglevel=INFO
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careeros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: careeros-redis
          property: connectionString
      - key: ATS_ENGINE_URL
        value: http://careeros-ats-engine:8001
      - key: AI_REWRITER_URL
        value: http://careeros-ai-rewriter:8003
      - key: RESUME_PARSER_URL
        value: http://careeros-resume-parser:8004
      - key: MATCH_ENGINE_URL
        value: http://careeros-match-engine:8005
      - key: JOBS_FEED_URL
        value: http://careeros-jobs-feed:8006
      - key: JWT_SECRET
        sync: false
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: EXPORT_STORAGE
        value: local
      - key: EXPORTS_DIR
        value: /tmp/careeros-exports
    autoDeploy: true

  - type: web
    name: careeros-web
    runtime: docker
    plan: starter
    dockerContext: apps/web
    dockerfilePath: Dockerfile
    dockerCommand: sh -c "pnpm start -p ${PORT:-3000}"
    envVars:
      - key: NEXT_PUBLIC_CORE_API_URL
        value: https://careeros-core-api.onrender.com
    autoDeploy: true

databases:
  - name: careeros-db
    plan: free
    databaseName: careeros
    user: careeros
    ipAllowList: []
