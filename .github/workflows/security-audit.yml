name: Security audit

# Runs weekly and on push to catch newly disclosed CVEs.
# Dependency auditing is also part of the main ci.yml workflow.
# TEMPORARILY DISABLED — re-enable by restoring push/schedule triggers
on:
  workflow_dispatch:

jobs:
  python-audit:
    name: Python CVE audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit core-api (fail on critical)
        run: |
          pip-audit \
            -r services/core-api/requirements.txt \
            --no-deps \
            --skip-editable \
            --progress-spinner off
        # pip-audit exits 1 when vulnerabilities are found; critical = fail the job

      - name: Audit ai-rewriter
        run: |
          pip-audit \
            -r services/ai-rewriter/requirements.txt \
            --no-deps \
            --skip-editable \
            --progress-spinner off
        continue-on-error: true

      - name: Audit resume-parser
        run: |
          pip-audit \
            -r services/resume-parser/requirements.txt \
            --no-deps \
            --skip-editable \
            --progress-spinner off
        continue-on-error: true

      - name: Audit match-engine (skip torch local build tag)
        run: |
          grep -v "^torch==" services/match-engine/requirements.txt \
            > /tmp/match-reqs.txt
          pip-audit \
            -r /tmp/match-reqs.txt \
            --no-deps \
            --skip-editable \
            --progress-spinner off
        continue-on-error: true

  npm-audit:
    name: npm CVE audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (critical only)
        run: pnpm audit --audit-level critical --filter web
        continue-on-error: true
