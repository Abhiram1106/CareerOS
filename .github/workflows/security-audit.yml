name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python dependencies (core-api)
        run: |
          pip-audit -r services/core-api/requirements.txt --desc on --severity critical --fail-on critical

      - name: Audit Python dependencies (ai-rewriter)
        run: |
          pip-audit -r services/ai-rewriter/requirements.txt --desc on --severity critical --fail-on critical
        continue-on-error: true

      - name: Audit Python dependencies (resume-parser)
        run: |
          pip-audit -r services/resume-parser/requirements.txt --desc on --severity critical --fail-on critical
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --audit-level critical --filter web
