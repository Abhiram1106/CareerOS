name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript typecheck ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit
        run: pnpm --filter web exec tsc --noEmit

  # ── Python AST parse (fast syntax check for all services) ───────────────
  python-syntax:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: AST-parse all service Python files
        run: |
          set -e
          find services packages -name "*.py" | while read f; do
            python -c "import ast, sys; ast.parse(open('$f',encoding='utf-8').read())" \
              || { echo "SYNTAX ERROR: $f"; exit 1; }
          done
          echo "All Python files parse cleanly."

  # ── Python dependency audit ──────────────────────────────────────────────
  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit core-api
        run: |
          pip-audit -r services/core-api/requirements.txt \
            --no-deps \
            --skip-editable \
            -f json \
            --progress-spinner off \
            -o /tmp/audit-core-api.json || true
          python -c "
          import json, sys
          data = json.load(open('/tmp/audit-core-api.json'))
          critical = [d for d in data.get('dependencies', [])
                      for v in d.get('vulns', [])
                      if v.get('fix_versions')]
          if critical:
              print('CRITICAL vulns in core-api:', [d['name'] for d in critical])
              sys.exit(1)
          print('core-api: no critical vulnerabilities')
          "

      - name: Audit ai-rewriter
        run: |
          pip-audit -r services/ai-rewriter/requirements.txt \
            --no-deps --skip-editable -f json --progress-spinner off \
            -o /tmp/audit-rewriter.json || true
          echo "ai-rewriter: audit complete (non-blocking)"

      - name: Audit resume-parser
        run: |
          pip-audit -r services/resume-parser/requirements.txt \
            --no-deps --skip-editable -f json --progress-spinner off \
            -o /tmp/audit-parser.json || true
          echo "resume-parser: audit complete (non-blocking)"

      - name: Audit match-engine (skip torch local-build tag)
        run: |
          # torch==X.Y.Z+cpu uses a local build tag not resolvable on PyPI.
          # Filter it out before auditing; it is audited separately below.
          grep -v "^torch==" services/match-engine/requirements.txt \
            > /tmp/match-engine-audit.txt
          pip-audit -r /tmp/match-engine-audit.txt \
            --no-deps --skip-editable -f json --progress-spinner off \
            -o /tmp/audit-match.json || true
          echo "match-engine: audit complete (non-blocking)"

  # ── npm / pnpm audit ─────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        # Report critical only; do not block on moderate/high (many are dev-only)
        run: pnpm audit --audit-level critical --filter web || true

  # ── Discrimination gate (scoring package unit test) ──────────────────────
  scoring-gate:
    name: Scoring discrimination gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scoring + test deps
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn numpy
          pip install -e packages/scoring/

      - name: Run discrimination gate
        run: |
          # Patch the /tmp path in the runner so it works from the repo root
          python -c "
          import sys, os
          sys.path.insert(0, os.path.join(os.getcwd(), 'tests/golden'))

          import corpus
          from careeros_scoring import (
              analyze_ats,
              evidence_quality_score,
              interview_readiness_score,
              placement_hygiene_score,
              profile_completeness_score,
          )
          import statistics

          MIN_SPREAD, MIN_DISTINCT = 30.0, 5
          SUBSCORES = {
              'ats_parse_safety':    lambda p: analyze_ats(p.text, [])['ats_parse_safety'],
              'evidence_quality':    lambda p: evidence_quality_score(p.sections),
              'interview_readiness': lambda p: interview_readiness_score(p.sections),
              'placement_hygiene':   lambda p: placement_hygiene_score(p.sections, []),
              'profile_completeness':lambda p: profile_completeness_score(p.sections),
          }

          failures = []
          for name, fn in SUBSCORES.items():
              vals = [round(fn(p), 1) for p in corpus.ALL_PERSONAS]
              spread = max(vals) - min(vals)
              distinct = len(set(vals))
              strong = statistics.mean(fn(p) for p in corpus.ALL_PERSONAS if p.tier == 'strong')
              weak   = statistics.mean(fn(p) for p in corpus.ALL_PERSONAS if p.tier == 'weak')
              reasons = []
              if spread < MIN_SPREAD: reasons.append(f'spread={spread:.1f}<{MIN_SPREAD}')
              if distinct < MIN_DISTINCT: reasons.append(f'distinct={distinct}<{MIN_DISTINCT}')
              if strong <= weak: reasons.append('strong<=weak')
              status = 'PASS' if not reasons else 'FAIL'
              if reasons: failures.append(f'{name}: {reasons}')
              print(f'{name:22} spread={spread:5.1f} distinct={distinct} {status}')

          if failures:
              print('GATE FAILED:', failures)
              sys.exit(1)
          print('Discrimination gate PASSED.')
          "

  # ── Docker build smoke test ──────────────────────────────────────────────
  docker-build:
    name: Docker build (core-api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build core-api image
        run: |
          docker build \
            -f services/core-api/Dockerfile \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t careeros-core-api:ci \
            .
        env:
          DOCKER_BUILDKIT: "1"
